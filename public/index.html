<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChromaFlora Design System</title>
  <style>
    /* ============================================
       CHROMAFLORA DESIGN SYSTEM
       Complete CSS Implementation
       ============================================ */
    
    /* CSS Custom Properties */
    :root {
      /* Backgrounds */
      --bg-deep: #0a0a1a;
      --bg-surface: #16213e;
      --bg-card: rgba(20, 15, 40, 0.8);
      --bg-card-hover: rgba(30, 25, 60, 0.9);
      --bg-elevated: rgba(40, 35, 70, 0.9);
      
      /* Primary Accents */
      --accent-purple: #a855f7;
      --accent-purple-light: #c084fc;
      --accent-purple-dark: #7c3aed;
      --accent-cyan: #22d3d8;
      --accent-cyan-light: #67e8f9;
      --accent-cyan-dark: #06b6d4;
      --accent-magenta: #ec4899;
      --accent-magenta-light: #f472b6;
      --accent-orange: #fb923c;
      
      /* Text */
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.5);
      
      /* Borders */
      --border-subtle: rgba(255, 255, 255, 0.1);
      --border-medium: rgba(255, 255, 255, 0.2);
      
      /* Gradients */
      --gradient-cosmic: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f0f23 100%);
      --gradient-glow-cyan: linear-gradient(135deg, #06b6d4 0%, #22d3d8 50%, #67e8f9 100%);
      --gradient-glow-purple: linear-gradient(135deg, #a855f7 0%, #8b5cf6 100%);
      --gradient-rainbow: linear-gradient(135deg, #ec4899, #a855f7, #22d3d8);
      
      /* Glow Effects */
      --glow-purple: 0 0 20px rgba(168, 85, 247, 0.4), 0 0 40px rgba(168, 85, 247, 0.2);
      --glow-cyan: 0 0 20px rgba(34, 211, 216, 0.4), 0 0 40px rgba(34, 211, 216, 0.2);
      --glow-magenta: 0 0 20px rgba(236, 72, 153, 0.4), 0 0 40px rgba(236, 72, 153, 0.2);
      
      /* Spacing */
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      
      /* Radii */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-full: 9999px;
      
      /* Transitions */
      --transition-fast: 0.1s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-normal: 0.1s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Reset & Base */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-primary);
      background: var(--bg-deep);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      cursor: none;
    }
    
    /* Cosmic Background */
    .cosmic-bg {
      position: fixed;
      inset: 0;
      background: var(--gradient-cosmic);
      z-index: -2;
    }
    
    .cosmic-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(168, 85, 247, 0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(34, 211, 216, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(236, 72, 153, 0.1) 0%, transparent 60%);
      animation: ambient-shift 20s ease-in-out infinite alternate;
    }
    
    @keyframes ambient-shift {
      0% { opacity: 0.8; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.1); }
    }
    
    /* Glow Edge Animation - Vibe-based */
    @keyframes glow-edge {
      0% { border-color: var(--accent-purple); box-shadow: 0 0 10px var(--accent-purple-dark), inset 0 0 5px var(--accent-purple); }
      50% { border-color: var(--accent-cyan); box-shadow: 0 0 25px var(--accent-cyan-light), inset 0 0 10px var(--accent-cyan); }
      100% { border-color: var(--accent-purple); box-shadow: 0 0 10px var(--accent-purple-dark), inset 0 0 5px var(--accent-purple); }
    }

    .glow-hover:hover {
      animation: glow-edge 2s infinite ease-in-out;
      border: 1px solid var(--accent-cyan) !important;
    }

    /* Custom Cursor - Warping, Morphing, Melting Vibe */
    .custom-cursor {
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.5) 0%, rgba(34, 211, 216, 0.3) 40%, transparent 70%);
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      filter: blur(25px);
      mix-blend-mode: screen;
      animation: morph-cursor 6s infinite ease-in-out;
      display: none;
    }

    @keyframes morph-cursor {
      0% { border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
      25% { border-radius: 70% 30% 46% 54% / 30% 39% 61% 70%; transform: translate(-50%, -50%) scale(1.2) rotate(90deg); }
      50% { border-radius: 30% 70% 70% 30% / 67% 30% 70% 33%; transform: translate(-50%, -50%) scale(0.8) rotate(180deg); }
      75% { border-radius: 58% 42% 35% 65% / 35% 65% 35% 65%; transform: translate(-50%, -50%) scale(1.1) rotate(270deg); }
      100% { border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; transform: translate(-50%, -50%) scale(1) rotate(360deg); }
    }

    /* Glass Panel Utility */
    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    /* ============================================
       HEADER
       ============================================ */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: rgba(10, 10, 26, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-subtle);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--gradient-rainbow);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--glow-purple);
      border: 1px solid transparent;
      transition: all var(--transition-fast);
    }
    
    .logo-icon svg {
      width: 20px;
      height: 20px;
    }
    
    .logo-text {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(90deg, var(--accent-purple), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .nav {
      display: flex;
      gap: 24px;
      align-items: center;
    }
    
    .nav-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      transition: color var(--transition-fast);
      position: relative;
    }
    
    .nav-link:hover,
    .nav-link.active {
      color: var(--text-primary);
    }
    
    .nav-link.active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--gradient-glow-cyan);
      border-radius: 1px;
      box-shadow: var(--glow-cyan);
    }
    
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
      box-shadow: var(--glow-cyan);
      border: 1px solid transparent;
      transition: all var(--transition-fast);
    }
    
    /* ============================================
       MAIN LAYOUT
       ============================================ */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: var(--space-lg);
    }
    
    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: var(--space-md);
    }
    
    /* ============================================
       CARDS
       ============================================ */
    .card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-subtle);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
      transition: all var(--transition-normal);
      position: relative;
    }
    
    .card:hover {
      background: var(--bg-card-hover);
      transform: translateY(-4px) scale(1.01);
    }
    
    .hero-card {
      display: flex;
      min-height: 280px;
      margin-bottom: var(--space-lg);
    }
    
    .hero-content {
      flex: 1;
      padding: var(--space-xl);
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(236, 72, 153, 0.1));
    }
    
    .hero-subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: var(--space-sm);
    }
    
    .hero-title {
      font-size: 42px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text-primary), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: var(--space-sm);
    }
    
    .hero-description {
      color: var(--text-secondary);
      margin-bottom: var(--space-lg);
    }
    
    .hero-image {
      flex: 1;
      background: var(--gradient-rainbow);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      animation: gradient-flow 10s infinite alternate linear;
    }

    @keyframes gradient-flow {
      0% { filter: hue-rotate(0deg) saturate(1.2); }
      100% { filter: hue-rotate(90deg) saturate(1.8); }
    }
    
    .hero-emoji {
      font-size: 120px;
      opacity: 0.8;
      z-index: 1;
    }
    
    /* ============================================
       BUTTONS
       ============================================ */
    .btn {
      padding: 12px 24px;
      border-radius: var(--radius-full);
      border: 1px solid transparent;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      transition: all var(--transition-normal);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: white;
    }
    
    .btn--primary {
      background: var(--gradient-glow-cyan);
      box-shadow: var(--glow-cyan);
    }
    
    .btn--primary:hover {
      box-shadow: 0 0 30px rgba(34, 211, 216, 0.6), 0 0 60px rgba(34, 211, 216, 0.3);
      transform: scale(1.02);
    }
    
    .btn--secondary {
      background: transparent;
      border: 1px solid var(--accent-purple);
      color: var(--accent-purple);
    }
    
    .btn--secondary:hover {
      background: rgba(168, 85, 247, 0.1);
      box-shadow: var(--glow-purple);
    }
    
    /* ============================================
       GALLERY
       ============================================ */
    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
    }
    
    .gallery-item {
      border-radius: var(--radius-md);
      overflow: hidden;
      cursor: pointer;
      transition: all var(--transition-fast);
      position: relative;
      border: 1px solid transparent;
    }
    
    .gallery-item:hover {
      transform: scale(1.05);
      z-index: 10;
    }
    
    .gallery-image {
      width: 100%;
      padding-bottom: 100%;
      position: relative;
      overflow: hidden;
    }
    
    .gallery-image--1 { background: linear-gradient(135deg, #ec4899, #8b5cf6, #06b6d4); }
    .gallery-image--2 { background: linear-gradient(45deg, #f97316, #ec4899, #8b5cf6); }
    .gallery-image--3 { background: linear-gradient(180deg, #06b6d4, #8b5cf6, #ec4899); }
    .gallery-image--4 { background: linear-gradient(225deg, #8b5cf6, #ec4899, #f97316); }
    .gallery-image--5 { background: linear-gradient(90deg, #22d3d8, #a855f7, #f472b6); }
    .gallery-image--6 { background: linear-gradient(315deg, #f472b6, #22d3d8, #a855f7); }

    .gallery-image::before {
      content: '';
      position: absolute;
      inset: -20%;
      background: inherit;
      filter: blur(30px);
      opacity: 0.6;
      animation: morph-vibe 8s infinite alternate ease-in-out;
    }

    @keyframes morph-vibe {
      0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; transform: scale(1); }
      100% { border-radius: 70% 30% 30% 70% / 70% 70% 30% 30%; transform: scale(1.2); }
    }
    
    .gallery-label {
      padding: var(--space-sm);
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg-card);
    }

    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: var(--space-lg);
    }

    .filter-chip {
      padding: 8px 16px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border-medium);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .filter-chip--active {
      background: var(--gradient-glow-purple);
      color: white;
      border-color: transparent;
    }
  </style>
</head>
<body>
  <div class="cosmic-bg"></div>
  <div class="custom-cursor" id="cursor"></div>
  
  <header class="header glass-panel">
    <div class="logo">
      <div class="logo-icon glow-hover">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
        </svg>
      </div>
      <span class="logo-text">ChromaFlora</span>
    </div>
    <nav class="nav">
      <a href="#" class="nav-link active">Design System</a>
      <a href="swirl-generator.html" class="nav-link">Generator</a>
      <a href="#" class="nav-link">Projects</a>
      <div class="avatar glow-hover"></div>
    </nav>
  </header>

  <main class="main">
    <section>
      <div class="card hero-card glow-hover glass-panel">
        <div class="hero-content">
          <span class="hero-subtitle">Bioluminescent Interface</span>
          <h1 class="hero-title">Cosmic Design Language</h1>
          <p class="hero-description">A state-of-the-art visual suite inspired by digital flora and deep space phenomena.</p>
          <div style="display: flex; gap: 12px;">
            <button class="btn btn--primary glow-hover">Get Started</button>
            <button class="btn btn--secondary glow-hover glass-panel">Documentation</button>
          </div>
        </div>
        <div class="hero-image">
          <div class="hero-emoji">✨</div>
        </div>
      </div>
    </section>

    <section style="margin-top: var(--space-xl);">
      <h2 class="section-title">Visual Library</h2>
      <div class="filters">
        <button class="filter-chip filter-chip--active glow-hover">All Effects</button>
        <button class="filter-chip">Procedural</button>
        <button class="filter-chip">Biolume</button>
        <button class="filter-chip">Cosmic</button>
      </div>
      
      <div class="gallery">
        <div class="gallery-item glow-hover glass-panel">
          <div class="gallery-image gallery-image--1"></div>
          <div class="gallery-label">Abstract Flows</div>
        </div>
        <div class="gallery-item glow-hover glass-panel">
          <div class="gallery-image gallery-image--2"></div>
          <div class="gallery-label">Liquid Neon</div>
        </div>
        <div class="gallery-item glow-hover glass-panel">
          <div class="gallery-image gallery-image--3"></div>
          <div class="gallery-label">Plasma Drift</div>
        </div>
        <div class="gallery-item glow-hover glass-panel">
          <div class="gallery-image gallery-image--4"></div>
          <div class="gallery-label">Cosmic Tide</div>
        </div>
        <div class="gallery-item glow-hover glass-panel">
          <div class="gallery-image gallery-image--5"></div>
          <div class="gallery-label">Floral Glow</div>
        </div>
        <div class="gallery-item glow-hover glass-panel">
          <div class="gallery-image gallery-image--6"></div>
          <div class="gallery-label">Deep Space</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', (e) => {
      cursor.style.display = 'block';
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
    document.addEventListener('mouseleave', () => {
      cursor.style.display = 'none';
    });
  </script>
</body>
</html>
