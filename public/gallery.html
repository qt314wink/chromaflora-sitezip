<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Creator Gallery · ChromaFlora</title>
<meta name="description" content="Community-created art and music from the ChromaFlora universe — share your procedural art and synthesized songs.">
<meta name="author" content="Jennipher Troup">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#04040f;--purple:#a855f7;--aqua:#22d3ee;--pink:#ec4899;--orange:#f97316;--green:#10b981;--border:rgba(255,255,255,0.08);--t-snap:0.1s cubic-bezier(0.4,0,0.2,1);--t-spring:0.4s cubic-bezier(0.34,1.56,0.64,1)}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:#fff;min-height:100dvh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 25% 20%,rgba(168,85,247,0.1) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(249,115,22,0.07) 0%,transparent 60%)}

  .header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:60px;background:rgba(4,4,15,0.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
  .logo{font-weight:800;font-size:16px}.logo a{color:white;text-decoration:none}
  .nav{display:flex;gap:4px}
  .nav-link{padding:6px 14px;border-radius:8px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.6);text-decoration:none;transition:var(--t-snap)}
  .nav-link:hover,.nav-link.active{color:white;background:rgba(255,255,255,0.07)}

  .reveal{opacity:0;transform:translateY(18px);transition:opacity 0.5s ease,transform 0.5s cubic-bezier(0.34,1.56,0.64,1)}
  .reveal.visible{opacity:1;transform:translateY(0)}

  /* ── Hero ── */
  .hero{padding:80px 24px 48px;text-align:center}
  .hero-title{font-size:clamp(36px,7vw,68px);font-weight:900;letter-spacing:-3px;margin-bottom:12px;background:linear-gradient(135deg,#fff,rgba(168,85,247,0.85),rgba(249,115,22,0.75));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .hero-sub{font-size:16px;color:rgba(255,255,255,0.45);max-width:500px;margin:0 auto 40px;line-height:1.65}

  /* ── Tabs ── */
  .tabs{display:flex;justify-content:center;gap:6px;margin-bottom:40px}
  .tab{padding:9px 22px;border-radius:99px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);font-size:13px;font-weight:600;cursor:pointer;color:rgba(255,255,255,0.55);transition:var(--t-snap)}
  .tab:hover,.tab.active{background:rgba(168,85,247,0.15);border-color:rgba(168,85,247,0.35);color:white}

  /* ── Gallery grids ── */
  .gallery-section{max-width:1200px;margin:0 auto;padding:0 24px 80px}
  .art-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .song-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}

  /* ── Art card ── */
  .art-card{border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.025);transition:var(--t-smooth);cursor:pointer}
  .art-card:hover{transform:translateY(-5px);border-color:rgba(168,85,247,0.25);box-shadow:0 16px 50px rgba(0,0,0,0.5),0 0 24px rgba(168,85,247,0.12)}
  .art-thumb{height:200px;position:relative;overflow:hidden}
  .art-thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .art-thumb-canvas{width:100%;height:100%;display:block}
  .art-info{padding:16px}
  .art-user{font-size:13px;font-weight:700;color:rgba(255,255,255,0.9)}
  .art-prompt{font-size:11px;color:rgba(255,255,255,0.4);margin-top:3px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .art-date{font-size:10px;color:rgba(255,255,255,0.25);font-family:'JetBrains Mono',monospace;margin-top:8px}
  .art-actions{display:flex;gap:8px;margin-top:12px}
  .art-btn{flex:1;padding:7px;border-radius:9px;border:none;cursor:pointer;font-size:11px;font-weight:600;transition:var(--t-snap)}
  .art-btn-dl{background:rgba(168,85,247,0.12);color:rgba(168,85,247,0.85);border:1px solid rgba(168,85,247,0.2)}
  .art-btn-dl:hover{background:rgba(168,85,247,0.25);color:white}
  .art-btn-share{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.1)}
  .art-btn-share:hover{background:rgba(255,255,255,0.1);color:white}

  /* ── Song card ── */
  .song-card{border-radius:18px;border:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.025);padding:20px;transition:var(--t-smooth);display:flex;align-items:center;gap:16px}
  .song-card:hover{transform:translateY(-4px);border-color:rgba(249,115,22,0.25);box-shadow:0 12px 40px rgba(0,0,0,0.5),0 0 20px rgba(249,115,22,0.1)}
  .song-icon{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;position:relative;overflow:hidden}
  .song-icon canvas{position:absolute;inset:0;width:100%;height:100%}
  .song-icon-emoji{position:relative;z-index:2}
  .song-info{flex:1;min-width:0}
  .song-title{font-size:14px;font-weight:700}
  .song-meta{font-size:11px;color:rgba(255,255,255,0.4);font-family:'JetBrains Mono',monospace;margin-top:3px}
  .song-actions{display:flex;gap:6px;flex-direction:column;flex-shrink:0}
  .song-btn{padding:6px 12px;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:600;transition:var(--t-snap)}
  .song-play-btn{background:linear-gradient(135deg,#f97316,#a855f7);color:white}
  .song-play-btn:hover{transform:scale(1.05)}
  .song-dl-btn{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.1)}
  .song-dl-btn:hover{background:rgba(255,255,255,0.1);color:white}

  /* ── Empty state ── */
  .empty-state{text-align:center;padding:80px 24px;color:rgba(255,255,255,0.25)}
  .empty-icon{font-size:56px;margin-bottom:16px}
  .empty-title{font-size:20px;font-weight:700;margin-bottom:8px;color:rgba(255,255,255,0.4)}
  .empty-sub{font-size:14px;line-height:1.6;max-width:380px;margin:0 auto 24px}
  .empty-link{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:12px;border:1px solid rgba(168,85,247,0.3);background:rgba(168,85,247,0.1);color:rgba(200,150,255,0.9);text-decoration:none;font-size:14px;font-weight:600;transition:var(--t-snap)}
  .empty-link:hover{background:rgba(168,85,247,0.2);color:white}

  /* ── Share modal ── */
  .share-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,10,0.8);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.2s}
  .share-overlay.open{opacity:1;pointer-events:all}
  .share-modal{background:linear-gradient(160deg,#0d0822,#07041a);border:1px solid rgba(168,85,247,0.2);border-radius:22px;max-width:440px;width:100%;padding:32px;position:relative;transform:scale(0.92);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1)}
  .share-overlay.open .share-modal{transform:scale(1)}
  .share-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.6);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--t-snap)}
  .share-close:hover{background:rgba(236,72,153,0.2);color:white}
  .share-title{font-size:20px;font-weight:800;margin-bottom:20px}
  .share-options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .share-option{padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);cursor:pointer;text-align:center;transition:var(--t-snap)}
  .share-option:hover{border-color:rgba(168,85,247,0.3);background:rgba(168,85,247,0.08)}
  .share-option-icon{font-size:24px;margin-bottom:6px}
  .share-option-label{font-size:12px;font-weight:600;color:rgba(255,255,255,0.7)}
</style>
</head>
<body>

<header class="header">
  <div class="logo"><a href="index.html">ChromaFlora</a></div>
  <nav class="nav">
    <a href="index.html" class="nav-link">System</a>
    <a href="projects.html" class="nav-link">Projects</a>
    <a href="studio.html" class="nav-link">Studio</a>
    <a href="gallery.html" class="nav-link active">Gallery</a>
    <a href="blog.html" class="nav-link">Blog</a>
    <a href="about.html" class="nav-link">About</a>
  </nav>
</header>

<div class="hero">
  <h1 class="hero-title reveal">Creator Gallery</h1>
  <p class="hero-sub reveal">Art and music born from the void — every piece made by the ChromaFlora community.</p>
  <div class="tabs reveal">
    <button class="tab active" data-tab="art">🎨 Artworks</button>
    <button class="tab" data-tab="songs">🎵 Songs</button>
  </div>
</div>

<div class="gallery-section">
  <div id="artPanel">
    <div class="art-grid" id="artGrid"></div>
  </div>
  <div id="songPanel" style="display:none">
    <div class="song-grid" id="songGrid"></div>
  </div>
</div>

<!-- Share modal -->
<div class="share-overlay" id="shareOverlay">
  <div class="share-modal">
    <button class="share-close" id="shareClose">✕</button>
    <div class="share-title">Share this creation</div>
    <div class="share-options">
      <div class="share-option" id="shareIG">
        <div class="share-option-icon">📸</div>
        <div class="share-option-label">Instagram</div>
      </div>
      <div class="share-option" id="shareTwitter">
        <div class="share-option-icon">🐦</div>
        <div class="share-option-label">Twitter/X</div>
      </div>
      <div class="share-option" id="shareLink">
        <div class="share-option-icon">🔗</div>
        <div class="share-option-label">Copy Link</div>
      </div>
      <div class="share-option" id="shareDownload">
        <div class="share-option-icon">⬇</div>
        <div class="share-option-label">Download</div>
      </div>
    </div>
  </div>
</div>

<script src="player-bar.js"></script>
<script>
/* ── Genre icons ── */
const GENRE_ICONS = {lofi:'☕',ambient:'🌌',rnb:'🎙',techno:'⚡',jazz:'🎷',house:'🏠',liquiddub:'🌊'};

/* ── Load data ── */
function getArtworks() { try{return JSON.parse(localStorage.getItem('cf_artworks')||'[]');}catch(e){return[];} }
function getSongs() { try{return JSON.parse(localStorage.getItem('cf_songs')||'[]');}catch(e){return[];} }

/* ── Tab switch ── */
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const t = tab.dataset.tab;
    document.getElementById('artPanel').style.display = t==='art' ? '' : 'none';
    document.getElementById('songPanel').style.display = t==='songs' ? '' : 'none';
    if (t==='art') renderArt();
    else renderSongs();
  });
});

/* ── Render artworks ── */
function renderArt() {
  const artworks = getArtworks();
  const grid = document.getElementById('artGrid');
  if (!artworks.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">🎨</div>
      <div class="empty-title">No artworks yet</div>
      <div class="empty-sub">Create something in the Art Studio and share it with the community!</div>
      <a href="studio.html" class="empty-link">✦ Open Art Studio</a>
    </div>`;
    return;
  }
  grid.innerHTML = '';
  artworks.slice().reverse().forEach((art, i) => {
    const card = document.createElement('div');
    card.className = 'art-card reveal';
    card.style.transitionDelay = (i*0.05)+'s';
    card.innerHTML = `
      <div class="art-thumb">
        ${art.dataUrl
          ? `<img src="${art.dataUrl}" alt="Art by @${art.username||'anon'}">`
          : `<canvas class="art-thumb-canvas" width="280" height="200"></canvas>`
        }
      </div>
      <div class="art-info">
        <div class="art-user">@${art.username||'anonymous'}</div>
        <div class="art-prompt">${art.prompt||'Untitled creation'}</div>
        <div class="art-date">${new Date(art.timestamp).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</div>
        <div class="art-actions">
          <button class="art-btn art-btn-dl">⬇ Download</button>
          <button class="art-btn art-btn-share">↗ Share</button>
        </div>
      </div>
    `;
    card.querySelector('.art-btn-dl').addEventListener('click', e => { e.stopPropagation(); downloadArt(art); });
    card.querySelector('.art-btn-share').addEventListener('click', e => { e.stopPropagation(); openShare(art.dataUrl,'art'); });
    grid.appendChild(card);
  });
  revIO.disconnect();
  document.querySelectorAll('.reveal').forEach(el=>revIO.observe(el));
}

/* ── Render songs ── */
function renderSongs() {
  const songs = getSongs();
  const grid = document.getElementById('songGrid');
  if (!songs.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">🎵</div>
      <div class="empty-title">No songs yet</div>
      <div class="empty-sub">Open the ChromaSynth player, create a session, and share it with the community!</div>
      <a href="player.html" class="empty-link">✦ Open ChromaSynth</a>
    </div>`;
    return;
  }
  grid.innerHTML = '';
  songs.slice().reverse().forEach((song, i) => {
    const card = document.createElement('div');
    card.className = 'song-card reveal';
    card.style.transitionDelay = (i*0.05)+'s';
    card.innerHTML = `
      <div class="song-icon">
        <canvas width="50" height="50"></canvas>
        <span class="song-icon-emoji">${GENRE_ICONS[song.genre]||'🎵'}</span>
      </div>
      <div class="song-info">
        <div class="song-title">${song.title||song.genre+' Session'}</div>
        <div class="song-meta">by ${song.nickname||'anonymous'} · ${song.bpm} BPM · ${new Date(song.timestamp).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
        ${song.tags ? `<div style="margin-top:5px;font-size:10px;color:rgba(255,255,255,0.3)">${song.tags}</div>` : ''}
      </div>
      <div class="song-actions">
        <button class="song-btn song-play-btn">▶ Play</button>
        <button class="song-btn song-dl-btn">⬇ Save</button>
      </div>
    `;
    // Draw waveform
    drawWaveform(card.querySelector('canvas'), song.genre);
    card.querySelector('.song-play-btn').addEventListener('click', () => {
      if (window.CFPlayer) {
        const genreMap={lofi:0,ambient:1,rnb:2,techno:3,jazz:4,house:5,liquiddub:6};
        const idx = genreMap[song.genre];
        if(idx!==undefined) window.CFPlayer.setGenre(idx);
        window.CFPlayer.init();
        window.CFPlayer.play();
      }
    });
    card.querySelector('.song-dl-btn').addEventListener('click', () => openShare(null,'song', song));
    grid.appendChild(card);
  });
  revIO.disconnect();
  document.querySelectorAll('.reveal').forEach(el=>revIO.observe(el));
}

function drawWaveform(canvas, genre) {
  if (!canvas) return;
  const W=canvas.width=50, H=canvas.height=50;
  const ctx=canvas.getContext('2d');
  const colors={lofi:'#f97316',ambient:'#22d3ee',rnb:'#ec4899',techno:'#6366f1',jazz:'#f59e0b',house:'#10b981',liquiddub:'#a855f7'};
  const c=colors[genre]||'#a855f7';
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=c+'22'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=c; ctx.lineWidth=1.5; ctx.beginPath();
  for(let x=0;x<W;x++){
    const y=H/2+Math.sin(x*0.5)*8+Math.sin(x*0.2)*5;
    x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
}

/* ── Download art ── */
function downloadArt(art) {
  if (art.dataUrl) {
    const a=document.createElement('a');
    a.href=art.dataUrl;
    a.download=`chromaflora-art-${art.username||'anon'}-${Date.now()}.png`;
    a.click();
  }
}

/* ── Share modal ── */
let shareTarget = null, shareType = null, shareSong = null;
function openShare(dataUrl, type, song=null) {
  shareTarget=dataUrl; shareType=type; shareSong=song;
  document.getElementById('shareOverlay').classList.add('open');
}
document.getElementById('shareClose').addEventListener('click', () => document.getElementById('shareOverlay').classList.remove('open'));
document.getElementById('shareOverlay').addEventListener('click', e => { if(e.target===document.getElementById('shareOverlay')) document.getElementById('shareOverlay').classList.remove('open'); });

document.getElementById('shareIG').addEventListener('click', () => {
  if (shareTarget) {
    const a=document.createElement('a');a.href=shareTarget;a.download='chromaflora-share.png';a.click();
    setTimeout(()=>window.open('https://instagram.com','_blank'),500);
  } else {
    alert('Download the song file, then upload it to Instagram as a Reel!');
  }
  document.getElementById('shareOverlay').classList.remove('open');
});

document.getElementById('shareTwitter').addEventListener('click', () => {
  const text = encodeURIComponent('Created with ChromaFlora Design System by @halcyonminx 🌌 #ChromaFlora #GenerativeArt');
  window.open(`https://twitter.com/intent/tweet?text=${text}`,'_blank');
  document.getElementById('shareOverlay').classList.remove('open');
});

document.getElementById('shareLink').addEventListener('click', () => {
  navigator.clipboard.writeText(location.href).then(()=>{
    document.getElementById('shareLink').querySelector('.share-option-label').textContent='✓ Copied!';
    setTimeout(()=>document.getElementById('shareLink').querySelector('.share-option-label').textContent='Copy Link',2000);
  });
});

document.getElementById('shareDownload').addEventListener('click', () => {
  if (shareTarget) {
    const a=document.createElement('a');a.href=shareTarget;a.download='chromaflora-creation.png';a.click();
  } else if (shareSong) {
    const meta = `ChromaFlora Song\nTitle: ${shareSong.title||'Untitled'}\nArtist: ${shareSong.nickname||'Anonymous'}\nGenre: ${shareSong.genre}\nBPM: ${shareSong.bpm}\nDate: ${new Date(shareSong.timestamp).toISOString()}\nCreated with ChromaFlora by Jennipher Troup`;
    const blob=new Blob([meta],{type:'text/plain'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='chromaflora-song-info.txt';a.click();
  }
  document.getElementById('shareOverlay').classList.remove('open');
});

/* ── Scroll reveal ── */
const revIO = new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');revIO.unobserve(e.target);}});
},{threshold:0.1});
document.querySelectorAll('.reveal').forEach(el=>revIO.observe(el));

/* ── Init ── */
renderArt();
</script>
</body>
</html>
